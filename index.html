<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MicroStore | Social Feed</title>
    <style>
        :root { --brand-color: #0095f6; --bg: #fafafa; --border: #dbdbdb; }
        body { font-family: -apple-system, sans-serif; background-color: var(--bg); margin: 0; padding-top: 110px; /* Space for sticky headers */ }

        /* 1. STICKY HEADER */
        header { 
            position: fixed; top: 0; width: 100%; background: white; 
            border-bottom: 1px solid var(--border); z-index: 1000;
            display: flex; flex-direction: column; align-items: center;
        }
        .top-bar { 
            display: flex; justify-content: space-between; align-items: center; 
            width: 100%; max-width: 500px; padding: 10px 15px; box-sizing: border-box;
        }
        .logo { font-size: 1.5rem; font-weight: bold; color: #262626; }
        .search-box { width: 100%; max-width: 500px; padding: 0 15px 10px; box-sizing: border-box; }
        #searchBar { 
            width: 100%; padding: 8px; border: 1px solid var(--border); 
            border-radius: 8px; background: #efefef; outline: none;
        }

        /* 2. CATEGORY NAV */
        .category-nav {
            width: 100%; max-width: 500px; overflow-x: auto; 
            white-space: nowrap; padding: 10px 5px; border-bottom: 1px solid var(--border);
            scrollbar-width: none; /* Hide scrollbar */
        }
        .category-nav::-webkit-scrollbar { display: none; }
        .cat-btn {
            display: inline-block; padding: 6px 15px; margin: 0 5px;
            background: white; border: 1px solid var(--border);
            border-radius: 20px; font-size: 0.9rem; cursor: pointer;
        }
        .cat-btn.active { background: var(--brand-color); color: white; border-color: var(--brand-color); }

        /* 3. PRODUCT FEED */
        .feed { max-width: 500px; width: 100%; margin: 0 auto; }
        .post { background: white; border: 1px solid var(--border); margin-bottom: 25px; border-radius: 8px; overflow: hidden; }
        .post-header { padding: 12px; font-weight: bold; font-size: 0.9rem; color: #262626; }
        .post-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; background: #efefef; }
        .post-info { padding: 15px; }
        .post-price { color: var(--brand-color); font-weight: bold; font-size: 1.2rem; margin-bottom: 5px; }
        .post-title { font-weight: bold; margin-bottom: 5px; }
        .buy-btn { background: var(--brand-color); color: white; border: none; padding: 12px; width: 100%; border-radius: 5px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <div class="top-bar">
            <div class="logo">MicroStore</div>
            <div class="cart-icon">🛒 <span id="cartCount">0</span></div>
        </div>
        <div class="search-box">
            <input type="text" id="searchBar" placeholder="Search products..." onkeyup="filterProducts()">
        </div>
        <div class="category-nav" id="categoryNav">
            <button class="cat-btn active" onclick="filterCategory('All', this)">All</button>
            <!-- Categories will be added here by JS -->
        </div>
    </header>

    <div class="feed" id="feed">
        <center style="margin-top:50px;">Loading Feed...</center>
    </div>

    <script>
        const csvUrl = "https://docs.google.com/spreadsheets/d/1iQzRLCmtpgGHqYexl32m3EUY35_WgmXvi4CCHqdGzu4/export?format=csv";
        let allProducts = [];

        async function loadData() {
            const response = await fetch(csvUrl);
            const data = await response.text();
            const rows = data.split("\n").slice(1);
            
            allProducts = rows.map(row => {
                const cols = row.split(",");
                return {
                    id: cols[0], title: cols[1], price: cols[2],
                    desc: cols[3], cat: cols[4], img: cols[5]?.trim()
                };
            }).filter(p => p.title); // Remove empty rows

            setupCategories();
            renderFeed(allProducts);
        }

        function setupCategories() {
            const nav = document.getElementById('categoryNav');
            const categories = [...new Set(allProducts.map(p => p.cat))];
            categories.forEach(cat => {
                if(!cat) return;
                const btn = document.createElement('button');
                btn.className = 'cat-btn';
                btn.innerText = cat;
                btn.onclick = (e) => filterCategory(cat, e.target);
                nav.appendChild(btn);
            });
        }

        function renderFeed(products) {
            const feed = document.getElementById('feed');
            feed.innerHTML = products.map(p => `
                <div class="post">
                    <div class="post-header">${p.cat}</div>
                    <img class="post-img" src="https://lh3.googleusercontent.com/u/0/d/${p.img}" alt="${p.title}">
                    <div class="post-info">
                        <div class="post-price">₦${p.price}</div>
                        <div class="post-title">${p.title}</div>
                        <div class="post-desc">${p.desc}</div>
                        <button class="buy-btn" onclick="alert('Added!')">Add to Cart</button>
                    </div>
                </div>
            `).join('');
        }

        function filterProducts() {
            const query = document.getElementById('searchBar').value.toLowerCase();
            const filtered = allProducts.filter(p => 
                p.title.toLowerCase().includes(query) || 
                p.desc.toLowerCase().includes(query)
            );
            renderFeed(filtered);
        }

        function filterCategory(cat, btn) {
            // UI Update
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            // Logic
            if(cat === 'All') {
                renderFeed(allProducts);
            } else {
                const filtered = allProducts.filter(p => p.cat === cat);
                renderFeed(filtered);
            }
        }

        loadData();
    </script>
</body>
</html>
