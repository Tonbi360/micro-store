<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MicroStore | Social Feed</title>
    <style>
        :root { --brand-color: #0095f6; --bg: #fafafa; --border: #dbdbdb; }
        body { font-family: -apple-system, sans-serif; background-color: var(--bg); margin: 0; padding-top: 110px; /* Space for sticky headers */ }

        /* 1. STICKY HEADER */
        header { 
            position: fixed; top: 0; width: 100%; background: white; 
            border-bottom: 1px solid var(--border); z-index: 1000;
            display: flex; flex-direction: column; align-items: center;
        }
        .top-bar { 
            display: flex; justify-content: space-between; align-items: center; 
            width: 100%; max-width: 500px; padding: 10px 15px; box-sizing: border-box;
        }
        .logo { font-size: 1.5rem; font-weight: bold; color: #262626; }
        .search-box { width: 100%; max-width: 500px; padding: 0 15px 10px; box-sizing: border-box; }
        #searchBar { 
            width: 100%; padding: 8px; border: 1px solid var(--border); 
            border-radius: 8px; background: #efefef; outline: none;
        }

        /* 2. CATEGORY NAV */
        .category-nav {
            width: 100%; max-width: 500px; overflow-x: auto; 
            white-space: nowrap; padding: 10px 5px; border-bottom: 1px solid var(--border);
            scrollbar-width: none; /* Hide scrollbar */
        }
        .category-nav::-webkit-scrollbar { display: none; }
        .cat-btn {
            display: inline-block; padding: 6px 15px; margin: 0 5px;
            background: white; border: 1px solid var(--border);
            border-radius: 20px; font-size: 0.9rem; cursor: pointer;
        }
        .cat-btn.active { background: var(--brand-color); color: white; border-color: var(--brand-color); }

        /* 3. PRODUCT FEED */
        .feed { max-width: 500px; width: 100%; margin: 0 auto; }
        
        /* ENHANCED POST STYLING */
        .post { background: white; border: 1px solid var(--border); margin-bottom: 15px; border-radius: 0; overflow: hidden; }
        
        .post-header { padding: 10px 15px; display: flex; align-items: center; justify-content: space-between; }
        .user-info { display: flex; align-items: center; gap: 8px; }
        .user-avatar { width: 30px; height: 30px; background: #ddd; border-radius: 50%; }
        .verified-badge { color: var(--brand-color); font-size: 0.8rem; }

        .post-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-top: 1px solid #f0f0f0; border-bottom: 1px solid #f0f0f0; }

        /* SOCIAL ACTIONS */
        .action-bar { padding: 10px 15px 5px; display: flex; gap: 15px; font-size: 1.4rem; }
        .action-btn { cursor: pointer; transition: transform 0.2s; }
        .action-btn:active { transform: scale(1.2); }
        .heart-active { color: #ed4956; }

        .post-info { padding: 0 15px 15px; }
        .post-price { font-weight: bold; font-size: 1rem; margin-bottom: 2px; display: block; }
        .post-title-row { margin-bottom: 5px; }
        .post-username { font-weight: bold; margin-right: 5px; }
        .post-desc { color: #555; font-size: 0.9rem; line-height: 1.4; }

        .buy-btn { 
            background: none; border: 1px solid var(--brand-color); color: var(--brand-color); 
            padding: 8px; width: 100%; border-radius: 4px; font-weight: bold; cursor: pointer; margin-top: 10px;
            transition: 0.2s;
        }
        .buy-btn:hover { background: var(--brand-color); color: white; }
    </style>
</head>
<body>

    <header>
        <div class="top-bar">
            <div class="logo">MicroStore</div>
            <div class="cart-icon">🛒 <span id="cartCount">0</span></div>
        </div>
        <div class="search-box">
            <input type="text" id="searchBar" placeholder="Search products..." onkeyup="filterProducts()">
        </div>
        <div class="category-nav" id="categoryNav">
            <button class="cat-btn active" onclick="filterCategory('All', this)">All</button>
            <!-- Categories will be added here by JS -->
        </div>
    </header>

    <div class="feed" id="feed">
        <center style="margin-top:50px;">Loading Feed...</center>
    </div>

    <script>
        const csvUrl = "https://docs.google.com/spreadsheets/d/1iQzRLCmtpgGHqYexl32m3EUY35_WgmXvi4CCHqdGzu4/export?format=csv";
        let allProducts = [];
        let likes = {}; // Track likes by product ID

        async function loadData() {
            const response = await fetch(csvUrl);
            const data = await response.text();
            const rows = data.split("\n").slice(1);
            
            allProducts = rows.map(row => {
                const cols = row.split(",");
                return {
                    id: cols[0], title: cols[1], price: cols[2],
                    desc: cols[3], cat: cols[4], img: cols[5]?.trim()
                };
            }).filter(p => p.title); // Remove empty rows

            // Initialize likes
            allProducts.forEach(p => {
                likes[p.id] = { count: Math.floor(Math.random() * 100), liked: false };
            });

            setupCategories();
            renderFeed(allProducts);
        }

        function setupCategories() {
            const nav = document.getElementById('categoryNav');
            const categories = [...new Set(allProducts.map(p => p.cat))];
            categories.forEach(cat => {
                if(!cat) return;
                const btn = document.createElement('button');
                btn.className = 'cat-btn';
                btn.innerText = cat;
                btn.onclick = (e) => filterCategory(cat, e.target);
                nav.appendChild(btn);
            });
        }

        function toggleLike(productId) {
            if (!likes[productId]) {
                likes[productId] = { count: 0, liked: false };
            }
            if (likes[productId].liked) {
                likes[productId].count--;
            } else {
                likes[productId].count++;
            }
            likes[productId].liked = !likes[productId].liked;
            renderFeed(allProducts); // Re-render to update like display
        }

        function renderFeed(products) {
            const feed = document.getElementById('feed');
            feed.innerHTML = products.map(p => {
                const likeData = likes[p.id] || { count: 0, liked: false };
                return `
                <div class="post">
                    <div class="post-header">
                        <div class="user-info">
                            <div class="user-avatar"></div>
                            <div>
                                <div class="post-username">${p.cat} <span class="verified-badge">✓</span></div>
                                <div style="font-size: 0.8rem; color: #888;">Verified Seller</div>
                            </div>
                        </div>
                        <div style="cursor: pointer; font-size: 1.2rem;">⋯</div>
                    </div>
                    <img class="post-img" src="https://lh3.googleusercontent.com/u/0/d/${p.img}" alt="${p.title}">
                    <div class="action-bar">
                        <span class="action-btn heart ${likeData.liked ? 'heart-active' : ''}" onclick="toggleLike('${p.id}')">❤️</span>
                        <span class="action-btn">💬</span>
                        <span class="action-btn">📤</span>
                    </div>
                    <div class="post-info">
                        <div style="font-size: 0.9rem; margin-bottom: 8px; font-weight: 500;">${likeData.count} likes</div>
                        <div class="post-title-row">
                            <span class="post-username">${p.cat}:</span>
                            <span>${p.title}</span>
                        </div>
                        <div class="post-desc">${p.desc}</div>
                        <div class="post-price">₦${p.price}</div>
                        <button class="buy-btn" onclick="alert('Added to cart!')">Add to Cart</button>
                    </div>
                </div>
                `;
            }).join('');
        }

        function filterProducts() {
            const query = document.getElementById('searchBar').value.toLowerCase();
            const filtered = allProducts.filter(p => 
                p.title.toLowerCase().includes(query) || 
                p.desc.toLowerCase().includes(query)
            );
            renderFeed(filtered);
        }

        function filterCategory(cat, btn) {
            // UI Update
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            // Logic
            if(cat === 'All') {
                renderFeed(allProducts);
            } else {
                const filtered = allProducts.filter(p => p.cat === cat);
                renderFeed(filtered);
            }
        }

        loadData();
    </script>
</body>
</html>
